name: Run Python Script via External Cron

on:
  repository_dispatch:
    types: [cron_trigger] # This matches the event_type we will send later

jobs:
  run-script:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
      ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        # Saxo trading controls
      SAXO_TRADING_ENABLED: ${{ secrets.SAXO_TRADING_ENABLED }}
      SAXO_DRY_RUN: ${{ secrets.SAXO_DRY_RUN }}
      SAXO_ENV: ${{ secrets.SAXO_ENV }}

  # Saxo authentication
      SAXO_ACCESS_TOKEN: ${{ secrets.SAXO_ACCESS_TOKEN }}
      SAXO_ACCOUNT_KEY: ${{ secrets.SAXO_ACCOUNT_KEY }}

  # Saxo order sizing and risk settings
      SAXO_ORDER_BUDGET_DKK: ${{ secrets.SAXO_ORDER_BUDGET_DKK }}
      SAXO_TAKE_PROFIT_PCT: ${{ secrets.SAXO_TAKE_PROFIT_PCT }}
      SAXO_TRAILING_STOP_PCT: ${{ secrets.SAXO_TRAILING_STOP_PCT }}
      SAXO_TRAILING_STEP_PCT: ${{ secrets.SAXO_TRAILING_STEP_PCT }}

  # Saxo symbol mapping
      SAXO_SYMBOL_MAP_JSON: ${{ secrets.SAXO_SYMBOL_MAP_JSON }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Python script
        run: python saxo_trader.py
